<!-- SEARCH RESULTS -->
<div class="list-group position-absolute" *ngIf="showSearch">

 <!-- Search wrapper -->
<div class="position-relative">

  <input
    type="text"
    class="form-control search-box"
    placeholder="Search"
    [(ngModel)]="input"
    (input)="search(input)"
  />

  <!-- 🔥 SEARCH RESULTS -->
  <div class="list-group search-dropdown" *ngIf="showSearch">

      [routerLink]="'/product/' + item.id"
      (click)="showSearch = false"
